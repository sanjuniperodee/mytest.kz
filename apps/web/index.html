    <script>
      (function () {
        try {
          var k = 'mytest-theme';
          var t = localStorage.getItem(k) || localStorage.getItem('bilimland-theme');
          var eff = 'dark';
          if (t === 'light') eff = 'light';
          else if (t === 'dark') eff = 'dark';
          else if (t === 'system')
            eff = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          document.documentElement.setAttribute('data-theme', eff);
        } catch (e) {}
      })();
    </script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
