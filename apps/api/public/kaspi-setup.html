<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Настройка Kaspi Pay — MyTest.kz</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 32px;
      width: 100%;
      max-width: 420px;
    }
    h1 { font-size: 1.5rem; margin-bottom: 6px; }
    .subtitle { color: #666; font-size: 0.875rem; margin-bottom: 24px; line-height: 1.5; }
    .field { margin-bottom: 16px; }
    label { display: block; font-size: 0.875rem; font-weight: 500; margin-bottom: 6px; }
    input {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #2563eb; }
    input.error { border-color: #dc2626; }
    button {
      width: 100%;
      padding: 11px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #1d4ed8; }
    button:disabled { background: #93c5fd; cursor: not-allowed; }
    button.secondary {
      background: #f3f4f6;
      color: #374151;
      margin-top: 8px;
    }
    button.secondary:hover { background: #e5e7eb; }
    .msg { padding: 10px 12px; border-radius: 8px; margin-top: 12px; font-size: 0.875rem; }
    .msg.error { background: #fee2e2; color: #991b1b; }
    .msg.success { background: #dcfce7; color: #166534; }
    .status { margin-top: 16px; padding: 12px; background: #f9fafb; border-radius: 8px; font-size: 0.875rem; }
    .status p { display: flex; justify-content: space-between; margin-bottom: 4px; }
    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3); border-top-color: white;
      border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    code { font-family: monospace; background: #e5e7eb; padding: 1px 5px; border-radius: 4px; font-size: 0.8em; }
    .separator { border-top: 1px solid #e5e7eb; margin-top: 16px; padding-top: 16px; }
  </style>
</head>
<body>
<div class="card" id="app">
  <h1>Настройка Kaspi Pay</h1>
  <p class="subtitle">
    Одноразовый вход кассира через OTP. Секрет — значение
    <code>KASPI_SESSION_SETUP_SECRET</code> из .env сервера.
  </p>

  <div class="field">
    <label>Секрет настройки</label>
    <input type="password" id="secret" placeholder="вставьте секрет из .env" autocomplete="off" />
  </div>

  <div class="field">
    <label>Телефон кассира (Kaspi)</label>
    <input type="tel" id="phone" placeholder="77001234567" />
  </div>

  <button id="btnRequest">Отправить код</button>

  <div id="otpSection" style="display:none">
    <div class="field" style="margin-top:12px">
      <label>OTP из SMS</label>
      <input type="text" id="otp" placeholder="код из SMS" inputmode="numeric" />
    </div>
    <button id="btnVerify">Подтвердить и сохранить</button>
  </div>

  <div id="msgBox"></div>

  <div class="separator">
    <button id="btnStatus" class="secondary">Проверить статус</button>
    <div id="statusBox"></div>
  </div>
</div>

<script>
const API = '/api/v1';
let processId = '';

function headers() {
  const s = document.getElementById('secret').value.trim();
  return s ? { 'X-Kaspi-Session-Setup-Secret': s, 'Content-Type': 'application/json' } : { 'Content-Type': 'application/json' };
}

function msg(el, text, type) {
  el.className = 'msg ' + type;
  el.textContent = text;
}

async function requestCode() {
  const phone = document.getElementById('phone').value.replace(/\D/g, '');
  if (phone.length < 10) { msg(document.getElementById('msgBox'), 'Введите корректный номер телефона', 'error'); return; }
  const btn = document.getElementById('btnRequest');
  btn.disabled = true; btn.textContent = '...';
  try {
    const res = await fetch(API + '/billing/kaspi/setup/request-code', {
      method: 'POST',
      headers: headers(),
      body: JSON.stringify({ phoneNumber: phone }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.message || data.error || 'Ошибка');
    processId = data.processId || '';
    document.getElementById('otpSection').style.display = 'block';
    msg(document.getElementById('msgBox'), 'Код отправлен. Введите OTP из SMS / приложения Kaspi.', 'success');
  } catch (e) {
    msg(document.getElementById('msgBox'), e.message, 'error');
  } finally {
    btn.disabled = false; btn.textContent = 'Отправить код';
  }
}

async function verifyOtp() {
  const otp = document.getElementById('otp').value.trim();
  if (!otp || otp.length < 4) { msg(document.getElementById('msgBox'), 'Введите код из SMS', 'error'); return; }
  const btn = document.getElementById('btnVerify');
  btn.disabled = true; btn.textContent = '...';
  try {
    const res = await fetch(API + '/billing/kaspi/setup/verify-otp', {
      method: 'POST',
      headers: headers(),
      body: JSON.stringify({ processId, otp }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.message || data.error || 'Ошибка верификации');
    msg(document.getElementById('msgBox'), 'Сессия сохранена. Kaspi готов к работе.', 'success');
    document.getElementById('otp').value = '';
    checkStatus();
  } catch (e) {
    msg(document.getElementById('msgBox'), e.message, 'error');
  } finally {
    btn.disabled = false; btn.textContent = 'Подтвердить и сохранить';
  }
}

async function checkStatus() {
  const btn = document.getElementById('btnStatus');
  btn.disabled = true; btn.textContent = '...';
  try {
    const res = await fetch(API + '/billing/kaspi/setup/status', { headers: headers() });
    const data = await res.json();
    if (!res.ok) throw new Error(data.message || data.error || 'Ошибка');
    const box = document.getElementById('statusBox');
    box.innerHTML = '<div class="status">' +
      '<p><span>Сессия в API:</span><span>' + (data.configured ? '✅ да' : '❌ нет') + '</span></p>' +
      '<p><span>Kaspi check:</span><span>' + (data.sessionActive ? '✅ активна' : '⚠️ неактивна / ошибка') + '</span></p>' +
    '</div>';
  } catch (e) {
    msg(document.getElementById('msgBox'), e.message, 'error');
  } finally {
    btn.disabled = false; btn.textContent = 'Проверить статус';
  }
}

document.getElementById('btnRequest').addEventListener('click', requestCode);
document.getElementById('btnVerify').addEventListener('click', verifyOtp);
document.getElementById('btnStatus').addEventListener('click', checkStatus);
</script>
</body>
</html>
